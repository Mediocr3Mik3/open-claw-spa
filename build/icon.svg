<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Marble vein hints -->
  <circle cx="120" cy="400" r="200" fill="url(#glow)" opacity="0.4"/>
  <circle cx="400" cy="120" r="180" fill="url(#glow)" opacity="0.3"/>
  <!-- Claw mark — three arced strokes -->
  <g transform="translate(256,256)" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" fill="none">
    <path d="M-80,-120 Q-60,0 -80,120"/>
    <path d="M0,-140 Q20,0 0,140"/>
    <path d="M80,-120 Q60,0 80,120"/>
  </g>
  <!-- Small lock icon at bottom center -->
  <g transform="translate(256,420)" fill="#58a6ff" opacity="0.6">
    <rect x="-14" y="-6" width="28" height="20" rx="4"/>
    <path d="M-8,-6 V-14 A8,8 0 0,1 8,-14 V-6" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
